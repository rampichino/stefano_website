<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="texture">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="4" seed="2"/>
      <feDisplacementMap in="SourceGraphic" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Canvas background - warm cream/bone -->
  <rect width="800" height="800" fill="#e8e0d0"/>

  <!-- Wood grain texture base -->
  <rect width="800" height="800" fill="url(#wood)" opacity="0.3"/>

  <!-- Large dark fragments / brushstrokes -->
  <rect x="80" y="60" width="180" height="25" rx="3" fill="#1a1a1a" transform="rotate(-8 80 60)" opacity="0.9"/>
  <rect x="300" y="90" width="220" height="18" rx="2" fill="#2c2c2c" transform="rotate(4 300 90)" opacity="0.85"/>
  <rect x="520" y="45" width="150" height="30" rx="4" fill="#111" transform="rotate(-12 520 45)" opacity="0.8"/>

  <rect x="50" y="180" width="140" height="20" rx="2" fill="#333" transform="rotate(6 50 180)" opacity="0.7"/>
  <rect x="250" y="160" width="280" height="22" rx="3" fill="#1c1c1c" transform="rotate(-3 250 160)" opacity="0.9"/>
  <rect x="580" y="145" width="170" height="28" rx="4" fill="#222" transform="rotate(9 580 145)" opacity="0.75"/>

  <!-- Mid-zone fragments -->
  <rect x="100" y="300" width="260" height="15" rx="2" fill="#555" transform="rotate(-5 100 300)" opacity="0.6"/>
  <rect x="200" y="340" width="190" height="20" rx="3" fill="#888" transform="rotate(7 200 340)" opacity="0.5"/>
  <rect x="450" y="280" width="230" height="18" rx="2" fill="#444" transform="rotate(-10 450 280)" opacity="0.7"/>
  <rect x="620" y="320" width="120" height="24" rx="3" fill="#666" transform="rotate(5 620 320)" opacity="0.55"/>

  <!-- White / light fragments -->
  <rect x="130" y="430" width="200" height="22" rx="3" fill="#f0f0f0" transform="rotate(-4 130 430)" opacity="0.85"/>
  <rect x="380" y="400" width="240" height="16" rx="2" fill="#e8e8e8" transform="rotate(8 380 400)" opacity="0.9"/>
  <rect x="60" y="500" width="160" height="20" rx="2" fill="#d8d8d8" transform="rotate(-6 60 500)" opacity="0.75"/>
  <rect x="540" y="460" width="200" height="28" rx="4" fill="#fafafa" transform="rotate(3 540 460)" opacity="0.8"/>

  <!-- Lower zone - scattered -->
  <rect x="90" y="600" width="300" height="14" rx="2" fill="#1a1a1a" transform="rotate(5 90 600)" opacity="0.7"/>
  <rect x="440" y="580" width="180" height="18" rx="3" fill="#333" transform="rotate(-7 440 580)" opacity="0.65"/>
  <rect x="650" y="620" width="110" height="22" rx="3" fill="#111" transform="rotate(11 650 620)" opacity="0.8"/>

  <rect x="150" y="690" width="220" height="16" rx="2" fill="#aaa" transform="rotate(-3 150 690)" opacity="0.5"/>
  <rect x="420" y="710" width="260" height="20" rx="3" fill="#bbb" transform="rotate(6 420 710)" opacity="0.45"/>
  <rect x="700" y="680" width="80" height="25" rx="3" fill="#888" transform="rotate(-9 700 680)" opacity="0.6"/>

  <!-- Scattered small chips -->
  <rect x="200" y="245" width="60" height="8" rx="1" fill="#111" transform="rotate(15 200 245)" opacity="0.7"/>
  <rect x="500" y="210" width="45" height="10" rx="1" fill="#eee" transform="rotate(-20 500 210)" opacity="0.8"/>
  <rect x="340" y="510" width="70" height="9" rx="1" fill="#333" transform="rotate(12 340 510)" opacity="0.6"/>
  <rect x="680" y="400" width="55" height="8" rx="1" fill="#ddd" transform="rotate(-15 680 400)" opacity="0.7"/>

  <!-- Noise/texture overlay -->
  <rect width="800" height="800" fill="#c8bfb0" opacity="0.15" filter="url(#noise)"/>

  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#1a1008" stop-opacity="0.35"/>
  </radialGradient>
  <rect width="800" height="800" fill="url(#vignette)"/>
</svg>
