<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <filter id="rough">
      <feTurbulence type="turbulence" baseFrequency="0.035" numOctaves="4" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="grit">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Raw canvas / gesso base -->
  <rect width="800" height="800" fill="#d4c9b0"/>

  <!-- Sky zone — pale, dusty -->
  <rect x="0" y="0" width="800" height="340" fill="#c9bfa8" opacity="0.6"/>

  <!-- Acrylic washes — ochre/ash tones -->
  <rect x="0" y="260" width="800" height="200" fill="#b8a882" opacity="0.4"/>
  <rect x="0" y="380" width="800" height="420" fill="#8a7d6a" opacity="0.5"/>

  <!-- Structural ruins — broken beams (dark) -->
  <!-- Diagonal major beam left -->
  <rect x="-20" y="200" width="420" height="28" rx="4" fill="#3a2e22" transform="rotate(32 -20 200)" opacity="0.9"/>
  <!-- Diagonal beam right -->
  <rect x="480" y="160" width="380" height="22" rx="3" fill="#2e2418" transform="rotate(-25 480 160)" opacity="0.85"/>
  <!-- Horizontal ruin beam -->
  <rect x="60" y="460" width="500" height="20" rx="3" fill="#4a3c2c" transform="rotate(3 60 460)" opacity="0.8"/>
  <!-- Snapped vertical -->
  <rect x="310" y="300" width="18" height="280" rx="3" fill="#382c1e" transform="rotate(8 310 300)" opacity="0.75"/>
  <!-- Another vertical fragment -->
  <rect x="540" y="350" width="14" height="220" rx="2" fill="#3a2e22" transform="rotate(-5 540 350)" opacity="0.7"/>

  <!-- Rubble pile — bottom zone -->
  <ellipse cx="200" cy="700" rx="200" ry="60" fill="#7a6e5e" opacity="0.7"/>
  <ellipse cx="500" cy="720" rx="240" ry="55" fill="#6e6050" opacity="0.65"/>
  <ellipse cx="720" cy="710" rx="140" ry="50" fill="#8a7a68" opacity="0.6"/>

  <!-- Debris chunks -->
  <polygon points="100,640 155,610 185,650 140,670" fill="#5a5040" opacity="0.85"/>
  <polygon points="240,650 295,625 310,660 260,675" fill="#4e4438" opacity="0.8"/>
  <polygon points="400,635 445,615 470,648 425,665" fill="#6a5c4c" opacity="0.75"/>
  <polygon points="560,645 600,622 625,655 585,670" fill="#544840" opacity="0.8"/>
  <polygon points="680,630 725,610 745,645 700,660" fill="#4a3e34" opacity="0.85"/>

  <!-- Small rubble -->
  <rect x="160" y="720" width="40" height="18" rx="2" fill="#5e5245" transform="rotate(12 160 720)" opacity="0.7"/>
  <rect x="320" y="710" width="55" height="14" rx="2" fill="#6a5c4e" transform="rotate(-8 320 710)" opacity="0.65"/>
  <rect x="480" y="730" width="35" height="16" rx="2" fill="#4e4438" transform="rotate(15 480 730)" opacity="0.75"/>

  <!-- Dust clouds -->
  <ellipse cx="150" cy="420" rx="90" ry="45" fill="#c4b898" opacity="0.4"/>
  <ellipse cx="620" cy="380" rx="110" ry="50" fill="#bdb09a" opacity="0.35"/>
  <ellipse cx="380" cy="350" rx="80" ry="40" fill="#c8bca4" opacity="0.3"/>

  <!-- Shattered concrete slabs -->
  <polygon points="80,480 180,460 200,520 90,535" fill="#9a9080" opacity="0.7"/>
  <polygon points="350,500 430,485 445,540 360,550" fill="#888070" opacity="0.65"/>
  <polygon points="590,510 670,495 685,550 600,560" fill="#9a9080" opacity="0.7"/>

  <!-- Light rays through dust — pale diagonal streaks -->
  <rect x="200" y="0" width="12" height="500" fill="#e8dcc8" transform="rotate(18 200 0)" opacity="0.15"/>
  <rect x="420" y="0" width="8" height="450" fill="#e0d4bc" transform="rotate(10 420 0)" opacity="0.12"/>
  <rect x="620" y="0" width="10" height="480" fill="#e4d8c4" transform="rotate(-8 620 0)" opacity="0.1"/>

  <!-- Grit texture overlay -->
  <rect width="800" height="800" fill="#b0a890" opacity="0.12" filter="url(#grit)"/>

  <!-- Vignette -->
  <radialGradient id="v2" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#1a1208" stop-opacity="0.5"/>
  </radialGradient>
  <rect width="800" height="800" fill="url(#v2)"/>
</svg>
